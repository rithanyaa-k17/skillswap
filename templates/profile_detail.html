{% extends "base.html" %} {% block content %}
<div class="container">
  <h1>{{ profile.name }}'s Skill Profile</h1>

  <div class="profile-detail-card">
    <p><strong>Name:</strong> {{ profile.name }}</p>
    <p><strong>Can Teach:</strong> {{ profile.teach_skill }}</p>
    <p><strong>Wants to Learn:</strong> {{ profile.learn_skill }}</p>
    <p><strong>Total Requests Received:</strong> {{ request_count }}</p>

    <a href="{{ url_for('send_request', profile_id=profile.id) }}" class="btn">
      Send Request
    </a>
  </div>
</div>
{% endblock %}
